<!DOCTYPE html>
<html>
<head>
<title>SalesOS</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-black flex items-center justify-center h-screen text-white">

<div class="p-8 bg-zinc-900 rounded w-80">
<h1 class="mb-4 text-xl">SalesOS</h1>

<input id="email" placeholder="Email" class="w-full mb-2 p-2 text-black">
<input id="password" type="password" placeholder="Password" class="w-full mb-2 p-2 text-black">

<button onclick="login(email.value,password.value)" class="w-full bg-white text-black py-2 mb-2">Login</button>
<button onclick="signup(email.value,password.value)" class="w-full bg-zinc-700 py-2">Create Account</button>

</div>

<script src="app.js"></script>

</body>
</html>
