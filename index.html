<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SalesOS Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: Inter, sans-serif; background:#000; }
    .glass-card{background:rgba(24,24,27,.45);backdrop-filter:blur(14px);border:1px solid rgba(63,63,70,.55);}
  </style>
</head>
<body class="min-h-screen text-white flex items-center justify-center px-4 relative overflow-hidden">
  <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[900px] h-[500px] bg-blue-600/20 rounded-full blur-[140px]"></div>

  <div class="glass-card w-full max-w-md rounded-2xl p-8 relative z-10">
    <div class="flex items-center gap-3 mb-8">
      <div class="w-11 h-11 rounded-xl bg-gradient-to-tr from-blue-700 to-blue-400 flex items-center justify-center">
        <iconify-icon icon="solar:chart-square-linear" class="text-white text-2xl"></iconify-icon>
      </div>
      <div>
        <h1 class="text-2xl font-semibold tracking-tight">SALESOS</h1>
        <p class="text-sm text-zinc-400">Rep + Growth Operator Dashboard</p>
      </div>
    </div>

    <div class="space-y-4">
      <div>
        <label class="text-xs text-zinc-400">Email</label>
        <input id="email" type="email" placeholder="you@company.com" class="mt-1 w-full bg-black/60 border border-zinc-800 rounded-lg px-3 py-3 text-sm outline-none focus:border-blue-500">
      </div>

      <div>
        <label class="text-xs text-zinc-400">Password</label>
        <input id="password" type="password" placeholder="••••••••" class="mt-1 w-full bg-black/60 border border-zinc-800 rounded-lg px-3 py-3 text-sm outline-none focus:border-blue-500">
      </div>

      <button onclick="login()" class="w-full bg-white text-black py-3 rounded-lg font-semibold hover:bg-zinc-200 transition">Login</button>
      <button onclick="signup()" class="w-full bg-zinc-900 border border-zinc-800 py-3 rounded-lg font-semibold hover:bg-zinc-800 transition">Create Account</button>

      <p id="msg" class="text-sm text-zinc-400 min-h-[20px]"></p>
    </div>
  </div>

<script>
const supabaseClient = supabase.createClient(
  "https://qagfyyqfzhczoyhuihiv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhZ2Z5eXFmemhjem95aHVpaGl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4Mjc1MDIsImV4cCI6MjA5MzQwMzUwMn0.Idn8QeB0RKhgB2FB9jft7Gtp164S7aeSy3hRYSOMFVE"
);

async function signup(){
  const { error } = await supabaseClient.auth.signUp({
    email: email.value.trim(),
    password: password.value.trim()
  });
  msg.innerText = error ? error.message : "Account created. Check email if confirmation is on, then login.";
}

async function login(){
  const { error } = await supabaseClient.auth.signInWithPassword({
    email: email.value.trim(),
    password: password.value.trim()
  });
  if(error){ msg.innerText = error.message; return; }
  window.location.href = "dashboard.html";
}

(async()=>{
  const { data } = await supabaseClient.auth.getSession();
  if(data.session) window.location.href = "dashboard.html";
})();
</script>
</body>
</html>
