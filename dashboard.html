<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SalesOS Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-black text-zinc-100 font-sans">

<div class="flex">

<!-- SIDEBAR -->
<div class="w-64 bg-black border-r border-zinc-800 p-4">
<h1 class="text-xl mb-6">SalesOS</h1>

<button onclick="go('dashboard.html')" class="block mb-2">Dashboard</button>
<button onclick="go('team.html')" class="block mb-2">Team</button>
<button onclick="go('activity.html')" class="block mb-2">Activity</button>
<button onclick="go('settings.html')" class="block mb-2">Settings</button>

<button onclick="logout()" class="mt-6 text-red-400">Logout</button>
</div>

<!-- MAIN -->
<div class="flex-1 p-6">

<h1 class="text-2xl mb-6">Dashboard</h1>

<!-- STATS -->
<div class="grid grid-cols-4 gap-4 mb-8">
<div class="bg-zinc-900 p-4 rounded">Revenue: <span id="rev">0</span></div>
<div class="bg-zinc-900 p-4 rounded">Deals: <span id="deals">0</span></div>
<div class="bg-zinc-900 p-4 rounded">Calls: <span id="calls">0</span></div>
<div class="bg-zinc-900 p-4 rounded">Appointments: <span id="apps">0</span></div>
</div>

<!-- LOG FORM -->
<div class="bg-zinc-900 p-4 rounded mb-6">
<h2 class="mb-4">Log Activity</h2>

<select id="type" class="text-black mb-2">
<option>Deal Closed</option>
<option>Call</option>
<option>Appointment</option>
</select><br>

<input id="client" placeholder="Client" class="text-black mb-2"><br>
<input id="amount" placeholder="Amount" class="text-black mb-2"><br>
<input id="service" placeholder="Service" class="text-black mb-2"><br>

<button onclick="log()" class="bg-white text-black px-3 py-1">Save</button>
</div>

<!-- TABLE -->
<table class="w-full text-left">
<thead>
<tr>
<th>Client</th>
<th>Service</th>
<th>Amount</th>
<th>Type</th>
<th>Rep</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>
</div>

<script>
const supabase = window.supabase.createClient(
"https://qagfyyqfzhczoyhuihiv.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhZ2Z5eXFmemhjem95aHVpaGl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4Mjc1MDIsImV4cCI6MjA5MzQwMzUwMn0.Idn8QeB0RKhgB2FB9jft7Gtp164S7aeSy3hRYSOMFVE"
);

let user, role;

async function init(){
const { data } = await supabase.auth.getUser();
user = data.user;

if(!user){
location.href="index.html";
return;
}

const { data: profile } = await supabase
.from("profiles")
.select("*")
.eq("id", user.id)
.single();

role = profile.role;

load();
}

async function load(){
let query = supabase.from("activities").select("*");

if(role==="sales_rep"){
query = query.eq("user_id", user.id);
}

const { data } = await query;

const table = document.getElementById("table");
table.innerHTML="";

let revenue=0;

data.forEach(d=>{
revenue += Number(d.deal_value||0);

table.innerHTML += `
<tr>
<td>${d.client_name}</td>
<td>${d.service_sold}</td>
<td>$${d.deal_value}</td>
<td>${d.activity_type}</td>
<td>${d.rep_name}</td>
</tr>
`;
});

document.getElementById("rev").innerText = revenue;
document.getElementById("deals").innerText = data.length;
}

async function log(){
await supabase.from("activities").insert([{
user_id:user.id,
client_name:client.value,
deal_value:amount.value,
service_sold:service.value,
activity_type:type.value,
rep_name:user.email
}]);

load();
}

function logout(){
supabase.auth.signOut();
location.href="index.html";
}

function go(p){ location.href=p }

init();
</script>

</body>
</html>
