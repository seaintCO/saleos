<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SalesOS</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { background:black; }
.glass {
  background: rgba(20,20,20,0.6);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
}
</style>

</head>

<body class="text-white flex items-center justify-center min-h-screen">

<div class="glass p-8 rounded-xl w-80">

<h1 class="text-2xl mb-6 text-center">SalesOS</h1>

<input id="email" placeholder="Email"
class="w-full p-2 mb-3 text-black rounded">

<input id="password" type="password" placeholder="Password"
class="w-full p-2 mb-4 text-black rounded">

<button onclick="signup()" class="w-full bg-white text-black py-2 rounded mb-2">
Create Account
</button>

<button onclick="login()" class="w-full bg-blue-500 py-2 rounded">
Login
</button>

<p id="msg" class="text-sm text-red-400 mt-3"></p>

</div>

<script>
const supabase = window.supabase.createClient(
"https://qagfyyqfzhczoyhuihiv.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhZ2Z5eXFmemhjem95aHVpaGl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4Mjc1MDIsImV4cCI6MjA5MzQwMzUwMn0.Idn8QeB0RKhgB2FB9jft7Gtp164S7aeSy3hRYSOMFVE"
);

async function signup(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({ email, password });

  if(error){
    document.getElementById("msg").innerText = error.message;
    return;
  }

  document.getElementById("msg").innerText = "Check your email to confirm.";
}

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  if(error){
    document.getElementById("msg").innerText = error.message;
    return;
  }

  // ✅ THIS FIXES LOGIN ISSUE
  if(data.session){
    window.location.href = "dashboard.html";
  } else {
    document.getElementById("msg").innerText = "Login failed.";
  }
}
</script>

</body>
</html>
