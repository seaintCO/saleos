<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

<script>
initAuth();

async function loadDashboard(){
  const data = await getActivities();

  let revenue = 0;

  data.forEach(d=>{
    revenue += Number(d.deal_value || 0);
  });

  // 🔥 Update your UI cards
  document.querySelectorAll("h3")[0].innerText = "$" + revenue;
}

loadDashboard();

/* LOG BUTTON */
async function logDeal(){
  const inputs = document.querySelectorAll("input");

  await addActivity({
    client_name: inputs[0].value,
    deal_value: inputs[1].value,
    service_sold: inputs[2].value,
    rep_name: currentUser.email,
    user_id: currentUser.id,
    activity_type: "Deal Closed"
  });

  alert("Saved");
}
</script>
