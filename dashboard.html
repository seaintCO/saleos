<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SalesOS Elite</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { background:black; color:white; font-family:Inter; }
.card { background:#111; padding:20px; border-radius:12px; }
</style>

</head>

<body class="p-6">

<h1 class="text-3xl mb-6">SalesOS Elite Dashboard</h1>

<div class="flex gap-6">

<!-- LEFT -->
<div class="w-64">
<button onclick="logout()" class="mb-4 text-red-400">Logout</button>

<div class="card mb-4">
<h2>Stats</h2>
<p>Revenue: <span id="rev">0</span></p>
<p>Deals: <span id="deals">0</span></p>
</div>

<div class="card">
<h2>Leaderboard</h2>
<div id="leaderboard"></div>
</div>

</div>

<!-- RIGHT -->
<div class="flex-1">

<div class="card mb-6">
<h2 class="mb-4">Log Activity</h2>

<select id="type" class="text-black mb-2">
<option>Deal Closed</option>
<option>Call</option>
<option>Appointment</option>
</select><br>

<input id="client" placeholder="Client" class="text-black mb-2"><br>
<input id="amount" placeholder="Amount" class="text-black mb-2"><br>
<input id="service" placeholder="Service" class="text-black mb-2"><br>

<button onclick="log()" class="bg-white text-black px-3 py-1">Save</button>
</div>

<div class="card">
<h2 class="mb-4">Recent Activity</h2>

<table class="w-full">
<thead>
<tr>
<th>Client</th>
<th>Service</th>
<th>Amount</th>
<th>Rep</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

</div>
</div>

<script>
const supabase = window.supabase.createClient(
"https://qagfyyqfzhczoyhuihiv.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhZ2Z5eXFmemhjem95aHVpaGl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4Mjc1MDIsImV4cCI6MjA5MzQwMzUwMn0.Idn8QeB0RKhgB2FB9jft7Gtp164S7aeSy3hRYSOMFVE"
);

let user, role;

async function init(){
const { data } = await supabase.auth.getUser();
user = data.user;

if(!user){
location.href="index.html";
return;
}

const { data: profile } = await supabase
.from("profiles")
.select("*")
.eq("id", user.id)
.single();

role = profile.role;

load();
}

async function load(){
let query = supabase.from("activities").select("*");

if(role==="sales_rep"){
query = query.eq("user_id", user.id);
}

const { data } = await query;

const table = document.getElementById("table");
table.innerHTML="";

let revenue=0;
let leaderboard={};

data.forEach(d=>{
revenue += Number(d.deal_value||0);

if(!leaderboard[d.rep_name]) leaderboard[d.rep_name]=0;
leaderboard[d.rep_name]+=Number(d.deal_value||0);

table.innerHTML += `
<tr>
<td>${d.client_name}</td>
<td>${d.service_sold}</td>
<td>$${d.deal_value}</td>
<td>${d.rep_name}</td>
</tr>
`;
});

document.getElementById("rev").innerText = revenue;
document.getElementById("deals").innerText = data.length;

/* leaderboard */
let lb = Object.entries(leaderboard)
.sort((a,b)=>b[1]-a[1]);

const lbDiv = document.getElementById("leaderboard");
lbDiv.innerHTML="";

lb.forEach((item,i)=>{
lbDiv.innerHTML += `<p>${i+1}. ${item[0]} - $${item[1]}</p>`;
});
}

async function log(){
await supabase.from("activities").insert([{
user_id:user.id,
client_name:client.value,
deal_value:amount.value,
service_sold:service.value,
activity_type:type.value,
rep_name:user.email
}]);

load();
}

function logout(){
supabase.auth.signOut();
location.href="index.html";
}

init();
</script>

</body>
</html>
