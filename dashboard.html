<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SalesOS Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; background:#000; }
.glass-card {
  background: rgba(24,24,27,.45);
  backdrop-filter: blur(12px);
  border:1px solid rgba(63,63,70,.45);
}
.hidden-screen { display:none !important; }
</style>
</head>

<body class="text-zinc-100">

<!-- LOGIN -->
<section id="authScreen" class="min-h-screen flex items-center justify-center">
  <div class="glass-card p-8 rounded-xl w-96">
    <h1 class="text-xl mb-6">SALESOS</h1>

    <input id="authEmail" placeholder="Email" class="w-full mb-3 p-2 text-black">
    <input id="authPassword" type="password" placeholder="Password" class="w-full mb-3 p-2 text-black">
    <input id="authName" placeholder="Name" class="w-full mb-4 p-2 text-black">

    <button onclick="signIn()" class="w-full bg-white text-black py-2 mb-2">Login</button>
    <button onclick="signUp()" class="w-full bg-zinc-800 py-2">Create Account</button>

    <p id="authMessage" class="text-sm mt-2"></p>
  </div>
</section>

<!-- APP -->
<section id="appScreen" class="hidden-screen p-6">

<h1 class="text-2xl mb-4">SalesOS Dashboard</h1>
<button onclick="signOut()" class="text-red-400 mb-4">Logout</button>

<!-- STATS -->
<div class="grid grid-cols-4 gap-4 mb-6">
<div class="glass-card p-4">Revenue: <span id="totalRevenue">$0</span></div>
<div class="glass-card p-4">Calls: <span id="totalCalls">0</span></div>
<div class="glass-card p-4">Appointments: <span id="totalAppts">0</span></div>
<div class="glass-card p-4">Deals: <span id="totalDeals">0</span></div>
</div>

<!-- LOG -->
<form onsubmit="logActivity(event)" class="glass-card p-4 mb-6">
<select id="activityType" class="text-black mb-2">
<option>Deal Closed</option>
<option>Call</option>
<option>Appointment</option>
</select><br>

<input id="clientName" placeholder="Client" class="text-black mb-2"><br>
<input id="dealValue" type="number" value="0" class="text-black mb-2"><br>
<input id="serviceSold" placeholder="Service" class="text-black mb-2"><br>

<button class="bg-white text-black px-4 py-2">Save</button>
<p id="saveMessage"></p>
</form>

<!-- TABLE -->
<table class="w-full">
<thead>
<tr>
<th>Client</th>
<th>Activity</th>
<th>Amount</th>
<th>Rep</th>
</tr>
</thead>
<tbody id="activityTable"></tbody>
</table>

<!-- LEADERBOARD -->
<div class="mt-6">
<h3>Leaderboard</h3>
<div id="leaderboard"></div>
</div>

</section>

<script>
const supabaseClient = supabase.createClient(
"https://qagfyyqfzhczoyhuihiv.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

let currentUser;
let activities = [];
let role = "sales_rep";

/* AUTH */

async function signUp(){
const email = authEmail.value;
const password = authPassword.value;
const name = authName.value;

const { error } = await supabaseClient.auth.signUp({
email,password,
options:{ data:{ full_name:name }}
});

authMessage.innerText = error ? error.message : "Check email then login";
}

async function signIn(){
const email = authEmail.value;
const password = authPassword.value;

const { data, error } = await supabaseClient.auth.signInWithPassword({ email,password });

if(error){ authMessage.innerText = error.message; return; }

currentUser = data.user;
showApp();
}

async function signOut(){
await supabaseClient.auth.signOut();
location.reload();
}

async function checkSession(){
const { data } = await supabaseClient.auth.getSession();
if(data.session){
currentUser = data.session.user;
showApp();
}
}

/* APP */

async function showApp(){
authScreen.classList.add("hidden-screen");
appScreen.classList.remove("hidden-screen");

const { data: profile } = await supabaseClient
.from("profiles")
.select("*")
.eq("id", currentUser.id)
.single();

role = profile?.role || "sales_rep";

loadActivities();
}

async function loadActivities(){

let query = supabaseClient.from("activities").select("*");

if(role==="sales_rep"){
query = query.eq("user_id", currentUser.id);
}

const { data } = await query;

activities = data || [];
render();
}

async function logActivity(e){
e.preventDefault();

await supabaseClient.from("activities").insert([{
user_id:currentUser.id,
rep_name:currentUser.email,
activity_type:activityType.value,
client_name:clientName.value,
deal_value:dealValue.value,
service_sold:serviceSold.value
}]);

loadActivities();
}

/* RENDER */

function render(){
let revenue = 0;
let deals = 0;
let calls = 0;
let appts = 0;

let map = {};

activityTable.innerHTML = "";

activities.forEach(a=>{
revenue += Number(a.deal_value||0);

if(a.activity_type==="Deal Closed") deals++;
if(a.activity_type==="Call") calls++;
if(a.activity_type==="Appointment") appts++;

if(!map[a.rep_name]) map[a.rep_name]=0;
map[a.rep_name]+=Number(a.deal_value||0);

activityTable.innerHTML += `
<tr>
<td>${a.client_name}</td>
<td>${a.activity_type}</td>
<td>$${a.deal_value}</td>
<td>${a.rep_name}</td>
</tr>`;
});

totalRevenue.innerText = "$"+revenue;
totalDeals.innerText = deals;
totalCalls.innerText = calls;
totalAppts.innerText = appts;

/* leaderboard */
leaderboard.innerHTML="";
Object.entries(map)
.sort((a,b)=>b[1]-a[1])
.forEach((r,i)=>{
leaderboard.innerHTML += `<p>${i+1}. ${r[0]} - $${r[1]}</p>`;
});
}

checkSession();
</script>

</body>
</html>
