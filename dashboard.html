<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SalesOS</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { background:#000; color:white; font-family: Inter, sans-serif; }
.glass { background: rgba(20,20,20,.6); border:1px solid rgba(255,255,255,.05); backdrop-filter: blur(12px); }
.active { background:#111; color:white; }
</style>
</head>

<body class="flex">

<!-- SIDEBAR -->
<div class="w-64 h-screen border-r border-zinc-800 p-4 space-y-2">

<h1 class="text-xl font-bold mb-6">SALESOS</h1>

<button onclick="showTab('dashboard', this)" class="tab active w-full text-left p-2 rounded">Dashboard</button>
<button onclick="showTab('team', this)" id="teamBtn" class="tab w-full text-left p-2 rounded text-zinc-400">Team</button>
<button onclick="showTab('analytics', this)" class="tab w-full text-left p-2 rounded text-zinc-400">Analytics</button>
<button onclick="showTab('calls', this)" class="tab w-full text-left p-2 rounded text-zinc-400">Calls</button>
<button onclick="showTab('deals', this)" class="tab w-full text-left p-2 rounded text-zinc-400">Deals</button>

<div class="mt-10 text-sm">
<p id="userEmail"></p>
<button onclick="logout()" class="mt-2 text-red-400">Logout</button>
</div>

</div>

<!-- MAIN -->
<div class="flex-1 p-6">

<!-- DASHBOARD -->
<div id="dashboard" class="section">
<h1 class="text-2xl font-bold mb-6">Dashboard</h1>

<div class="grid grid-cols-4 gap-4 mb-6">
<div class="glass p-4"><p>Revenue</p><h2 id="rev">$0</h2></div>
<div class="glass p-4"><p>Calls</p><h2 id="callsCount">0</h2></div>
<div class="glass p-4"><p>Appointments</p><h2 id="appts">0</h2></div>
<div class="glass p-4"><p>Deals</p><h2 id="dealsCount">0</h2></div>
</div>

<div class="glass p-4">
<h2 class="mb-2">Activity</h2>
<table class="w-full text-sm">
<thead>
<tr><th>Client</th><th>Type</th><th>Amount</th></tr>
</thead>
<tbody id="activity"></tbody>
</table>
</div>

</div>

<!-- TEAM -->
<div id="team" class="section hidden">
<h1 class="text-2xl font-bold mb-4">Team</h1>
<div id="teamList"></div>
</div>

<!-- ANALYTICS -->
<div id="analytics" class="section hidden">
<h1 class="text-2xl font-bold mb-4">Analytics</h1>
<p id="analyticsText"></p>
</div>

<!-- CALLS -->
<div id="calls" class="section hidden">
<h1 class="text-2xl font-bold mb-4">Calls</h1>
<div id="callsList"></div>
</div>

<!-- DEALS -->
<div id="deals" class="section hidden">
<h1 class="text-2xl font-bold mb-4">Deals</h1>
<div id="dealsList"></div>
</div>

</div>

<script>

// SUPABASE
const supabaseClient = supabase.createClient(
  "https://qagfyyqfzhczoyhuihiv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhZ2Z5eXFmemhjem95aHVpaGl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4Mjc1MDIsImV4cCI6MjA5MzQwMzUwMn0.Idn8QeB0RKhgB2FB9jft7Gtp164S7aeSy3hRYSOMFVE"
);

let user;
let role = "sales_rep";
let activities = [];

// INIT
async function init(){
  const { data } = await supabaseClient.auth.getSession();

  if(!data.session){
    window.location = "index.html";
    return;
  }

  user = data.session.user;
  userEmail.innerText = user.email;

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  role = profile?.role || "sales_rep";

  if(role !== "admin" && role !== "growth_operator"){
    teamBtn.style.display = "none";
  }

  loadData();
}

// LOAD DATA
async function loadData(){
  let query = supabaseClient.from("activities").select("*");

  if(role === "sales_rep"){
    query = query.eq("user_id", user.id);
  }

  const { data } = await query;
  activities = data || [];

  render();
}

// RENDER
function render(){

  let revenue = 0;
  let calls = 0;
  let appts = 0;
  let deals = 0;

  activity.innerHTML = "";

  activities.forEach(a => {
    if(a.activity_type === "Deal Closed"){
      revenue += Number(a.deal_value || 0);
      deals++;
    }

    if(["Cold Call","Follow-up","Discovery Call"].includes(a.activity_type)){
      calls++;
    }

    if(a.activity_type === "Appointment Set"){
      appts++;
    }

    activity.innerHTML += `
      <tr>
        <td>${a.client_name || "-"}</td>
        <td>${a.activity_type}</td>
        <td>$${a.deal_value || 0}</td>
      </tr>
    `;
  });

  rev.innerText = "$" + revenue;
  callsCount.innerText = calls;
  appts.innerText = appts;
  dealsCount.innerText = deals;

  // TEAM (ADMIN ONLY)
  if(role !== "sales_rep"){
    const map = {};

    activities.forEach(a=>{
      const rep = a.rep_name || "Unknown";

      if(!map[rep]) map[rep] = 0;
      map[rep]++;
    });

    teamList.innerHTML = Object.entries(map).map(([rep,count]) =>
      `<div class="glass p-3 mb-2">${rep} — ${count} actions</div>`
    ).join("");
  }

  // CALLS TAB
  callsList.innerHTML = activities
    .filter(a => ["Cold Call","Follow-up","Discovery Call"].includes(a.activity_type))
    .map(a => `<div class="glass p-3 mb-2">${a.client_name} — ${a.activity_type}</div>`)
    .join("");

  // DEALS TAB
  dealsList.innerHTML = activities
    .filter(a => a.activity_type === "Deal Closed")
    .map(a => `<div class="glass p-3 mb-2">${a.client_name} — $${a.deal_value}</div>`)
    .join("");

  // ANALYTICS
  analyticsText.innerText = `Total Deals: ${deals} | Revenue: $${revenue}`;
}

// TABS
function showTab(tab, btn){
  document.querySelectorAll(".section").forEach(s => s.classList.add("hidden"));
  document.getElementById(tab).classList.remove("hidden");

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
}

// LOGOUT
async function logout(){
  await supabaseClient.auth.signOut();
  window.location = "index.html";
}

init();

</script>

</body>
</html>
