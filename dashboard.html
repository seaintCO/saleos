<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SalesOS Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  background: #000;
  color: white;
  font-family: Inter, sans-serif;
}
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body class="p-6">

<h1 class="text-2xl mb-4">SalesOS Dashboard</h1>
<button onclick="logout()" class="text-red-400 mb-4">Logout</button>

<!-- STATS -->
<div class="grid grid-cols-4 gap-4 mb-6">
  <div class="glass p-4 rounded">Revenue <h2 id="rev">$0</h2></div>
  <div class="glass p-4 rounded">Deals <h2 id="dealCount">0</h2></div>
  <div class="glass p-4 rounded">Calls <h2 id="callCount">0</h2></div>
  <div class="glass p-4 rounded">Appointments <h2 id="apptCount">0</h2></div>
</div>

<!-- FORM -->
<div class="glass p-4 rounded mb-6">
  <select id="type" class="text-black mb-2">
    <option>Deal Closed</option>
    <option>Call</option>
    <option>Appointment</option>
  </select>
  <input id="client" placeholder="Client" class="text-black mb-2">
  <input id="value" type="number" placeholder="Value" class="text-black mb-2">
  <input id="service" placeholder="Service" class="text-black mb-2">

  <button onclick="add()" class="bg-white text-black px-4 py-2">Add</button>
</div>

<!-- TABLE -->
<table class="w-full">
<thead>
<tr>
<th>Client</th>
<th>Type</th>
<th>Value</th>
<th>Service</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
const supabaseClient = supabase.createClient(
  "https://qagfyyqfzhczoyhuihiv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhZ2Z5eXFmemhjem95aHVpaGl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4Mjc1MDIsImV4cCI6MjA5MzQwMzUwMn0.Idn8QeB0RKhgB2FB9jft7Gtp164S7aeSy3hRYSOMFVE"
);

let user;

/* CHECK LOGIN */
async function init(){
  const { data } = await supabaseClient.auth.getSession();

  if(!data.session){
    window.location.href = "index.html";
    return;
  }

  user = data.session.user;
  load();
}

/* LOAD DATA */
async function load(){
  const { data } = await supabaseClient.from("activities").select("*");

  let revenue = 0, deals=0, calls=0, appts=0;

  table.innerHTML = "";

  data.forEach(d=>{
    revenue += Number(d.deal_value || 0);

    if(d.activity_type==="Deal Closed") deals++;
    if(d.activity_type==="Call") calls++;
    if(d.activity_type==="Appointment") appts++;

    table.innerHTML += `
    <tr>
      <td>${d.client_name}</td>
      <td>${d.activity_type}</td>
      <td>$${d.deal_value}</td>
      <td>${d.service_sold}</td>
    </tr>`;
  });

  rev.innerText = "$"+revenue;
  dealCount.innerText = deals;
  callCount.innerText = calls;
  apptCount.innerText = appts;
}

/* ADD */
async function add(){
  await supabaseClient.from("activities").insert([{
    client_name: client.value,
    activity_type: type.value,
    deal_value: value.value,
    service_sold: service.value,
    rep_name: user.email,
    user_id: user.id
  }]);

  load();
}

/* LOGOUT */
async function logout(){
  await supabaseClient.auth.signOut();
  window.location.href = "index.html";
}

init();
</script>

</body>
</html>
